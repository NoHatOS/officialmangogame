<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🥭 MANGO CHAOS: THE ADVENTURE 🥭</title>
    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body { background: #000; font-family: 'Impact', sans-serif; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }

        /* UI */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        #hud { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px #000; }
        .hp-bar { width: 300px; height: 35px; background: rgba(0,0,0,0.8); border: 4px solid #fff; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff8800); transition: 0.1s; }
        
        /* SHITPOST DIALOGS */
        #dialog-box {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 900px; background: rgba(5, 5, 5, 0.95);
            border: 6px solid #ff8800; padding: 25px; display: none; pointer-events: all;
            box-shadow: 0 0 50px rgba(255,136,0,0.3);
        }
        #p-img { width: 100px; height: 100px; float: left; border: 3px solid #fff; margin-right: 20px; }
        #p-name { color: #ff8800; font-size: 28px; margin-bottom: 10px; }
        #p-text { color: #fff; font-size: 24px; line-height: 1.2; }

        /* BOSS BAR */
        #boss-ui { position: absolute; top: 20px; width: 100%; text-align: center; display: none; }
        .boss-hp { width: 60%; height: 20px; background: #200; border: 2px solid #f00; display: inline-block; }
        #boss-fill { width: 100%; height: 100%; background: #f00; }
    </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="ui">
    <div id="hud">
        <div style="font-size: 20px;">MANGO'S WILL TO LIVE</div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="weapon-ui" style="font-size: 24px; color: #ff0; margin-top: 5px;">WEAPON: GLOCK</div>
    </div>

    <div id="boss-ui">
        <div id="boss-name" style="color: red; font-size: 30px; text-shadow: 2px 2px #000;">CHEF RAMSAY</div>
        <div class="boss-hp"><div id="boss-fill"></div></div>
    </div>

    <div id="dialog-box" onclick="game.nextDialog()">
        <img id="p-img" src="jugador.png">
        <div id="p-name">Mango</div>
        <div id="p-text">...</div>
        <div style="color:#444; font-size:14px; margin-top:10px;">[CLICK TO CONTINUE]</div>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- CARGA DE IMÁGENES ---
const S = {}; 
const files = {
    p: 'jugador.png', wife: 'esposa.png', kiwi: 'dr_kiwi.png',
    gun: 'pistola.png', smg: 'metralleta.png', baz: 'bazuca.png',
    b: 'bala.png', m: 'misil.png', grass: 'suelo_pasto.png', metal: 'suelo_metal.png',
    city: 'fondo_ciudad.jpg', clinic: 'interior_clinica.jpg', final: 'fondo_final.png',
    boom: 'explosion.png', sandia: 'enemigo_sandia.png', chef: 'chef.png', blender: 'licuadora.png'
};

Object.entries(files).forEach(([k, v]) => { S[k] = new Image(); S[k].src = v; });

// --- LÓGICA DEL JUEGO ---
const game = {
    lvl: 1, camX: 0, shake: 0, 
    state: 'PLAYING', dialogIdx: 0, curScript: null,
    bullets: [], enemies: [], particles: [],

    // EL GUIÓN (Shitpost real)
    scripts: {
        intro: [
            { n: "Wife", t: "Mango, you smell like trash. Go to the doctor.", i: 'wife' },
            { n: "Mango", t: "You're just jealous of my drip. Fine, I'll go.", i: 'p' }
        ],
        clinic: [
            { n: "Dr. Kiwi", t: "Bruh, you have 5 minutes left. The Chef poisoned your soil.", i: 'kiwi' },
            { n: "Mango", t: "Ayo? That's personal. Where is he?", i: 'p' },
            { n: "Dr. Kiwi", t: "Go to the industrial kitchen. Bring a bazooka.", i: 'kiwi' }
        ]
    },

    startDialog(key) {
        this.state = 'DIALOG';
        this.curScript = this.scripts[key];
        this.dialogIdx = 0;
        document.getElementById('dialog-box').style.display = 'block';
        this.renderLine();
    },

    renderLine() {
        const d = this.curScript[this.dialogIdx];
        document.getElementById('p-name').innerText = d.n;
        document.getElementById('p-text').innerText = d.t;
        document.getElementById('p-img').src = files[d.i];
    },

    nextDialog() {
        this.dialogIdx++;
        if(this.dialogIdx >= this.curScript.length) {
            document.getElementById('dialog-box').style.display = 'none';
            this.state = 'PLAYING';
            if(this.lvl === 1) this.lvl = 2; // Avanzar nivel tras hablar
        } else this.renderLine();
    }
};

const player = {
    x: 100, y: 0, vx: 0, vy: 0, w: 80, h: 90,
    hp: 100, dir: 1, ang: 0, ground: false, weapon: 'gun'
};

// --- INPUTS ---
const keys = {};
window.onkeydown = e => {
    keys[e.code] = true;
    if(e.code === 'Digit1') { player.weapon = 'gun'; document.getElementById('weapon-ui').innerText = "WEAPON: GLOCK"; }
    if(e.code === 'Digit2') { player.weapon = 'smg'; document.getElementById('weapon-ui').innerText = "WEAPON: UZI"; }
    if(e.code === 'Digit3') { player.weapon = 'baz'; document.getElementById('weapon-ui').innerText = "WEAPON: RPG-7"; }
};
window.onkeyup = e => keys[e.code] = false;
window.onmousedown = () => { if(game.state === 'PLAYING') shoot(); };

function shoot() {
    game.shake = player.weapon === 'baz' ? 20 : 8;
    game.bullets.push({
        x: player.x + (player.dir*50), y: player.y + 40,
        vx: player.dir * 25, type: player.weapon === 'baz' ? 'm' : 'b'
    });
    player.vx -= player.dir * (player.weapon === 'baz' ? 15 : 4); // Retroceso
}

// --- LOOP ---
function update() {
    if(game.state === 'PLAYING') {
        if(keys.KeyD) { player.vx += 1.5; player.dir = 1; }
        if(keys.KeyA) { player.vx -= 1.5; player.dir = -1; }
        if(keys.Space && player.ground) { player.vy = -22; player.ground = false; }

        player.vx *= 0.85; player.vy += 0.8;
        player.x += player.vx; player.y += player.vy;

        if(player.y > canvas.height - 180) { player.y = canvas.height - 180; player.vy = 0; player.ground = true; }
        
        player.ang = (player.vx * 0.05) + (player.vy * 0.02);
        game.camX = player.x - canvas.width/3;

        // Triggers de historia
        if(player.x > 600 && game.lvl === 1 && game.state !== 'DIALOG') game.startDialog('intro');
        if(player.x > 1500 && game.lvl === 2 && game.state !== 'DIALOG') game.startDialog('clinic');
    }

    if(game.shake > 0) game.shake *= 0.9;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    if(game.shake > 1) ctx.translate(Math.random()*game.shake, Math.random()*game.shake);

    // DIBUJAR FONDO SEGÚN NIVEL
    const bg = game.lvl === 1 ? S.city : (game.lvl === 2 ? S.clinic : S.final);
    if(bg.complete) ctx.drawImage(bg, -(game.camX*0.2)%canvas.width, 0, canvas.width, canvas.height);
    if(bg.complete) ctx.drawImage(bg, -(game.camX*0.2)%canvas.width + canvas.width, 0, canvas.width, canvas.height);

    // SUELO
    const fl = game.lvl === 3 ? S.metal : S.grass;
    if(fl.complete) {
        for(let i=0; i<15; i++) ctx.drawImage(fl, (i*250)-(game.camX%250), canvas.height-100, 250, 100);
    }

    // PERSONAJES DE LA HISTORIA
    if(game.lvl === 1 && S.wife.complete) ctx.drawImage(S.wife, 700 - game.camX, canvas.height - 180, 80, 90);
    if(game.lvl === 2 && S.kiwi.complete) ctx.drawImage(S.kiwi, 1600 - game.camX, canvas.height - 180, 80, 90);

    // JUGADOR
    ctx.save();
    ctx.translate(player.x - game.camX + player.w/2, player.y + player.h/2);
    ctx.rotate(player.ang);
    if(player.dir === -1) ctx.scale(-1, 1);
    ctx.drawImage(S.p, -player.w/2, -player.h/2, player.w, player.h);
    if(S[player.weapon]) ctx.drawImage(S[player.weapon], 20, 0, 60, 40);
    ctx.restore();

    // BALAS
    game.bullets.forEach((b, i) => {
        b.x += b.vx;
        if(S[b.type]) ctx.drawImage(S[b.type], b.x - game.camX, b.y, 35, 15);
        if(Math.abs(b.x - player.x) > 1500) game.bullets.splice(i, 1);
    });

    ctx.restore();
}

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
update();
</script>
</body>
</html>
