<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🥭 MANGO CHAOS 🥭</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        * { margin: 0; padding: 0; overflow: hidden; box-sizing: border-box; }
        body { background: #000; font-family: 'Permanent Marker', cursive; color: white; }
        canvas { display: block; filter: contrast(1.1) saturate(1.2); }

        /* FILTRO GRAFFITI */
        svg { width: 0; height: 0; position: absolute; }

        /* UI */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; }

        /* MENU MÁS PEQUEÑO */
        #menu {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; pointer-events: all;
        }
        .btn-play {
            font-family: 'Permanent Marker'; font-size: 50px; color: #ff0; background: none; border: none;
            cursor: pointer; text-shadow: 4px 4px 0 #f0f; transition: 0.2s; filter: url('#rough-edge');
        }

        /* BARRAS PEQUEÑAS */
        #hud-life {
            position: absolute; top: 15px; left: 15px; width: 180px; height: 35px;
            background: rgba(0,0,0,0.7); border: 3px solid #fff; filter: url('#rough-edge'); transform: rotate(-1deg);
        }
        #hp-fill { width: 100%; height: 100%; background: #ff0055; transition: 0.2s; }

        #swag-box {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 200px; border: 4px solid #0ff; filter: url('#rough-edge'); background: rgba(0,0,0,0.6);
        }
        #swag-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: #0ff; transition: 0.3s; }

        /* ARMA CIRCULAR PEQUEÑA */
        #weapon-ui {
            position: absolute; bottom: 20px; left: 20px; width: 90px; height: 90px;
            border: 5px solid #ff0; border-radius: 50%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            filter: url('#rough-edge'); transform: rotate(-5deg);
        }

        /* DIALOGO COMPACTO */
        #dialog {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70%; min-height: 100px; background: rgba(10,10,10,0.95);
            border: 5px solid #0ff; padding: 15px; display: none; pointer-events: all; filter: url('#rough-edge');
        }
    </style>
</head>
<body>

<svg><filter id="rough-edge"><feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" /><feDisplacementMap in="SourceGraphic" in2="noise" scale="5" /></filter></svg>

<div id="menu">
    <h1 style="font-size: 70px; text-shadow: 6px 6px 0 #f0f;">MANGO CHAOS</h1>
    <button class="btn-play" onclick="startGame()">START</button>
</div>

<div id="ui">
    <div id="hud-life"><div id="hp-fill"></div></div>
    <div id="swag-box"><div id="swag-fill"></div></div>
    <div id="weapon-ui">
        <img id="wpn-img" src="pistola.png" style="width: 50px;">
        <div id="ammo-txt" style="font-size: 18px; color: #ff0;">25</div>
    </div>
    <div id="dialog" onclick="game.nextDialog()">
        <img id="d-port" src="esposa.png" style="width: 70px; float: left; margin-right: 15px;">
        <h2 id="d-name" style="color: #f0f; font-size: 22px;"></h2>
        <p id="d-text" style="font-size: 16px;"></p>
    </div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- AUDIO (menu_musicc.mp3) ---
const audio = {
    menu: new Audio('menu_musicc.mp3'),
    current: null,
    play(sound) {
        if(this.current) this.current.pause();
        this.current = sound;
        this.current.loop = true;
        this.current.play().catch(() => console.log("Click to play music"));
    }
};

window.onclick = () => { if(!game.active && !audio.current) audio.play(audio.menu); };

// --- IMÁGENES ---
const S = {
    p: new Image(), w: new Image(), gun: new Image(), bg: new Image(), floor: new Image(), bullet: new Image()
};
S.p.src = 'jugador.png'; S.w.src = 'esposa.png'; S.gun.src = 'pistola.png';
S.bg.src = 'fondo_ciudad.jpg'; S.floor.src = 'suelo_pasto.png'; S.bullet.src = 'bala.png';

const game = {
    active: false, state: 'PLAYING', swag: 0, camX: 0,
    bullets: [],
    scripts: {
        tut: [{n:"WIFE", t:"Mango! You're tiny! Move with A/D, Jump with Space. Q to Dash!", i:"esposa.png"}]
    }
};

const player = {
    x: 100, y: 0, vx: 0, vy: 0, w: 70, h: 80, // Mango más pequeño
    hp: 100, dir: 1, angle: 0, grounded: false, ammo: 25
};

function startGame() {
    document.getElementById('menu').style.display = 'none';
    game.active = true;
    game.state = 'DIALOG';
    game.curS = game.scripts.tut;
    game.dIdx = 0;
    showDialog();
}

function showDialog() {
    const d = game.curS[game.dIdx];
    document.getElementById('dialog').style.display = 'block';
    document.getElementById('d-name').innerText = d.n;
    document.getElementById('d-text').innerText = d.t;
}

game.nextDialog = () => {
    game.state = 'PLAYING';
    document.getElementById('dialog').style.display = 'none';
};

function shoot() {
    if(player.ammo > 0 && game.state === 'PLAYING') {
        player.ammo--;
        document.getElementById('ammo-txt').innerText = player.ammo;
        game.bullets.push({x: player.x + (player.dir*40), y: player.y + 40, vx: player.dir*15});
    }
}

function update() {
    if(game.active && game.state === 'PLAYING') {
        let s = 1.1 + (game.swag/100);
        if(keys.KeyD) { player.vx += s; player.dir = 1; }
        if(keys.KeyA) { player.vx -= s; player.dir = -1; }
        if(keys.Space && player.grounded) { player.vy = -16; player.grounded = false; }

        player.vx *= 0.88; player.vy += 0.8;
        player.x += player.vx; player.y += player.vy;

        if(player.y > canvas.height - 180) { player.y = canvas.height - 180; player.vy = 0; player.grounded = true; }
        player.angle = player.vx * 0.05;
        game.camX = player.x - canvas.width/3;
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    if(!game.active) return;

    // Fondo y Suelo
    if(S.bg.complete) ctx.drawImage(S.bg, -(game.camX*0.2)%canvas.width, 0, canvas.width, canvas.height);
    if(S.floor.complete) {
        for(let i=0; i<20; i++) ctx.drawImage(S.floor, (i*150)-(game.camX%150), canvas.height-100, 150, 100);
    }

    // Dibujar Esposa
    if(S.w.complete) ctx.drawImage(S.w, 600 - game.camX, canvas.height-190, 80, 90);

    // Dibujar Balas
    game.bullets.forEach((b, i) => {
        b.x += b.vx;
        ctx.fillStyle = "yellow";
        ctx.fillRect(b.x - game.camX, b.y, 15, 5);
        if(Math.abs(b.x - player.x) > 1000) game.bullets.splice(i, 1);
    });

    // Dibujar Mango
    ctx.save();
    ctx.translate(player.x - game.camX + player.w/2, player.y + player.h/2);
    ctx.rotate(player.angle);
    if(player.dir === -1) ctx.scale(-1, 1);
    if(S.p.complete) ctx.drawImage(S.p, -player.w/2, -player.h/2, player.w, player.h);
    if(S.gun.complete) ctx.drawImage(S.gun, 20, 0, 45, 30);
    ctx.restore();
}

const keys = {};
window.onkeydown = e => { keys[e.code] = true; if(e.code === 'KeyQ') player.vx = player.dir*35; };
window.onkeyup = e => keys[e.code] = false;
window.onmousedown = shoot;

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
update();
</script>
</body>
</html>
