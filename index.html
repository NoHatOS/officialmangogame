<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🥭 MANGO CHAOS 🥭</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        * { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Permanent Marker', cursive; }
        canvas { display: block; }
        
        #debug-info { position: absolute; top: 0; left: 0; color: lime; font-family: monospace; font-size: 10px; pointer-events: none; z-index: 1000; }
        
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: none; }
        
        #menu {
            position: absolute; inset: 0; background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; pointer-events: all; border: 5px solid #f0f;
        }

        .btn-play {
            font-size: 50px; color: #ff0; background: none; border: 3px solid #ff0;
            padding: 10px 30px; cursor: pointer; text-shadow: 3px 3px 0 #f0f;
        }

        #hud-life { position: absolute; top: 15px; left: 15px; width: 150px; height: 25px; border: 2px solid #fff; }
        #hp-fill { width: 100%; height: 100%; background: red; }
    </style>
</head>
<body>

<div id="debug-info">Cargando recursos...</div>

<div id="menu">
    <h1 style="font-size: 60px; color: white; margin-bottom: 20px;">MANGO CHAOS</h1>
    <p style="color: #0ff; margin-bottom: 20px;">HAZ CLIC PARA ACTIVAR MÚSICA Y JUGAR</p>
    <button class="btn-play" onclick="startGame()">START</button>
</div>

<div id="ui">
    <div id="hud-life"><div id="hp-fill"></div></div>
    <div id="weapon-box" style="position:absolute; bottom:20px; left:20px; color:yellow; font-size:20px;">
        AMMO: <span id="ammo-txt">25</span>
    </div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const debug = document.getElementById('debug-info');

// --- CARGA DE ARCHIVOS CON VERIFICACIÓN ---
const assets = {
    p: { src: 'jugador.png', img: new Image(), loaded: false },
    bg: { src: 'fondo_ciudad.jpg', img: new Image(), loaded: false },
    floor: { src: 'suelo_pasto.png', img: new Image(), loaded: false },
    music: { src: 'menu_musicc.mp3', audio: new Audio(), loaded: false }
};

let loadedCount = 0;
Object.entries(assets).forEach(([key, val]) => {
    if(key === 'music') {
        val.audio.src = val.src;
        val.audio.oncanplaythrough = () => { val.loaded = true; checkAllLoaded(); };
        val.audio.onerror = () => { debug.innerHTML += `<br>❌ Error Audio: ${val.src}`; };
    } else {
        val.img.src = val.src;
        val.img.onload = () => { val.loaded = true; checkAllLoaded(); };
        val.img.onerror = () => { debug.innerHTML += `<br>❌ Error Imagen: ${val.src}`; };
    }
});

function checkAllLoaded() {
    loadedCount++;
    debug.innerHTML = `Recursos: ${loadedCount}/4 cargados.`;
}

// --- AUDIO ---
function playMenuMusic() {
    assets.music.audio.loop = true;
    assets.music.audio.play().catch(e => console.log("Audio block"));
}

// --- JUEGO ---
const game = { active: false, camX: 0, bullets: [] };
const player = { x: 100, y: 100, vx: 0, vy: 0, w: 60, h: 70, dir: 1, grounded: false, ammo: 25 };
const keys = {};

function startGame() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    game.active = true;
    playMenuMusic();
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;
window.onmousedown = () => {
    if(game.active && player.ammo > 0) {
        player.ammo--;
        document.getElementById('ammo-txt').innerText = player.ammo;
        game.bullets.push({x: player.x + 30, y: player.y + 30, vx: player.dir * 12});
    }
};

function update() {
    if(game.active) {
        if(keys.KeyD) { player.vx += 1; player.dir = 1; }
        if(keys.KeyA) { player.vx -= 1; player.dir = -1; }
        if(keys.Space && player.grounded) { player.vy = -15; player.grounded = false; }

        player.vx *= 0.9; player.vy += 0.7;
        player.x += player.vx; player.y += player.vy;

        if(player.y > canvas.height - 150) { player.y = canvas.height - 150; player.vy = 0; player.grounded = true; }
        game.camX = player.x - canvas.width/3;
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#111"; // Fondo oscuro por si falla la imagen
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(!game.active) return;

    // Fondo
    if(assets.bg.loaded) {
        ctx.drawImage(assets.bg.img, -(game.camX*0.2)%canvas.width, 0, canvas.width, canvas.height);
    }

    // Suelo
    ctx.fillStyle = "#222";
    ctx.fillRect(0, canvas.height-80, canvas.width, 80);
    if(assets.floor.loaded) {
        for(let i=0; i<10; i++) ctx.drawImage(assets.floor.img, (i*200)-(game.camX%200), canvas.height-80, 200, 80);
    }

    // Balas
    ctx.fillStyle = "yellow";
    game.bullets.forEach((b, i) => {
        b.x += b.vx;
        ctx.fillRect(b.x - game.camX, b.y, 10, 4);
    });

    // JUGADOR (Mango)
    ctx.save();
    ctx.translate(player.x - game.camX, player.y);
    if(player.dir === -1) { ctx.translate(player.w, 0); ctx.scale(-1, 1); }
    
    if(assets.p.loaded) {
        ctx.drawImage(assets.p.img, 0, 0, player.w, player.h);
    } else {
        // EMERGENCIA: Si no hay imagen, dibuja un mango naranja
        ctx.fillStyle = "orange";
        ctx.fillRect(0, 0, player.w, player.h);
        ctx.fillStyle = "black";
        ctx.fillText("MANGO", 10, 20);
    }
    ctx.restore();
}

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.onresize();
update();
</script>
</body>
</html>
